services:
  mysql_db:
    image: mysql:8.0
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql:Z

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mysql_web_client
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql_db
      PMA_ARBITRARY: 1
    depends_on:
      - mysql_db

volumes:
  mysql_data: